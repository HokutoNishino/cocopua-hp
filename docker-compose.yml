services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cocopua-web
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_RESERVATION_URL: ${VITE_RESERVATION_URL:-https://example.com/reservation}
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
